name: Windows CI

# Synthetic-only validation on windows-latest. This workflow must NEVER
# receive an Instagram credential, cookie, session, message, capture, or any
# live-account state. It uses no repository secrets. It uploads no artifacts
# that could contain runtime data.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      # Pinned by commit SHA for supply-chain hygiene (v5/v5 tags as of pin date).
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup .NET (respects global.json)
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore InstaDM.Windows.slnx

      - name: Build (Release)
        run: dotnet build InstaDM.Windows.slnx --configuration Release --no-restore /p:Platform=x64

      - name: Test (synthetic fixtures only)
        run: dotnet test tests/InstaDM.Core.Tests/InstaDM.Core.Tests.csproj --configuration Release --no-restore

      - name: Privacy scan
        shell: pwsh
        run: ./tools/privacy-audit.ps1
